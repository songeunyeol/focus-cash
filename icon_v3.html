<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Focus Cash — icon v3</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #07070f;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      color: #fff;
      padding: 56px 48px;
    }
    h1 { font-size: 18px; font-weight: 700; color: #ddd; margin-bottom: 6px; }
    .sub { color: #444; font-size: 13px; margin-bottom: 60px; }
    .row { display: flex; gap: 56px; flex-wrap: wrap; align-items: flex-end; }
    .icon-wrap {
      border-radius: 22.5%;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow:
        0 0 0 0.5px rgba(255,255,255,0.07),
        0 10px 40px rgba(0,0,0,0.85),
        0 30px 80px rgba(0,0,0,0.6),
        0 0 60px rgba(6,182,212,0.06);
    }
    .label {
      font-size: 11px; color: #444; text-align: center;
      margin-top: 12px; letter-spacing: 0.5px;
    }
    .col { display: flex; flex-direction: column; align-items: center; }
  </style>
</head>
<body>

<h1>Focus Cash — C 개선</h1>
<p class="sub">시침/분침 제거 · 차분하고 세련된 불꽃</p>

<div class="row">

  <!-- 512px (표시: 200px) -->
  <div class="col">
    <div class="icon-wrap" style="width:200px;height:200px;">
      <svg width="200" height="200" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
        <defs>

          <!-- 배경: 거의 검정에 가까운 심심한 네이비 -->
          <radialGradient id="bg" cx="50%" cy="42%">
            <stop offset="0%" stop-color="#12102a"/>
            <stop offset="60%" stop-color="#0c0a1e"/>
            <stop offset="100%" stop-color="#070610"/>
          </radialGradient>

          <!-- 내부 원판 -->
          <radialGradient id="plate" cx="42%" cy="36%">
            <stop offset="0%" stop-color="#19163a"/>
            <stop offset="55%" stop-color="#110e28"/>
            <stop offset="100%" stop-color="#0c0a1e"/>
          </radialGradient>

          <!-- 링 그라디언트 (시안 → 인디고 → 퍼플) -->
          <linearGradient id="ringTop" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#0EA5E9"/>
            <stop offset="50%" stop-color="#06B6D4"/>
            <stop offset="100%" stop-color="#4F46E5"/>
          </linearGradient>
          <linearGradient id="ringBot" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#4F46E5"/>
            <stop offset="100%" stop-color="#7C3AED"/>
          </linearGradient>

          <!-- 불꽃 레이어 1: 바깥 (퍼플 → 시안, 차분하게) -->
          <linearGradient id="flame1" x1="50%" y1="100%" x2="50%" y2="0%">
            <stop offset="0%"   stop-color="#3730A3" stop-opacity="0"/>
            <stop offset="15%"  stop-color="#4338CA" stop-opacity="0.7"/>
            <stop offset="45%"  stop-color="#6366F1"/>
            <stop offset="70%"  stop-color="#06B6D4"/>
            <stop offset="90%"  stop-color="#BAE6FD"/>
            <stop offset="100%" stop-color="#ffffff"  stop-opacity="0.6"/>
          </linearGradient>

          <!-- 불꽃 레이어 2: 중간 (더 밝은 시안) -->
          <linearGradient id="flame2" x1="50%" y1="100%" x2="50%" y2="0%">
            <stop offset="0%"   stop-color="#4F46E5" stop-opacity="0.5"/>
            <stop offset="30%"  stop-color="#0891B2"/>
            <stop offset="65%"  stop-color="#22D3EE"/>
            <stop offset="100%" stop-color="#E0F2FE"/>
          </linearGradient>

          <!-- 불꽃 레이어 3: 코어 (가장 밝음) -->
          <linearGradient id="flame3" x1="50%" y1="100%" x2="50%" y2="0%">
            <stop offset="0%"   stop-color="#0EA5E9"/>
            <stop offset="50%"  stop-color="#7DD3FC"/>
            <stop offset="100%" stop-color="#ffffff"/>
          </linearGradient>

          <!-- 불꽃 하단 glow (원판 위) -->
          <radialGradient id="baseGlow" cx="50%" cy="100%">
            <stop offset="0%"   stop-color="#06B6D4" stop-opacity="0.35"/>
            <stop offset="60%"  stop-color="#4F46E5" stop-opacity="0.12"/>
            <stop offset="100%" stop-color="transparent"/>
          </radialGradient>

          <!-- 광택 -->
          <radialGradient id="shine" cx="32%" cy="24%">
            <stop offset="0%"  stop-color="rgba(255,255,255,0.09)"/>
            <stop offset="65%" stop-color="rgba(255,255,255,0)"/>
          </radialGradient>

          <!-- 필터들 -->
          <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="11" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="glow2" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="ambient" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="28"/>
          </filter>
          <filter id="coreGlow" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="16" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>

          <!-- 링 마스크 (원 바깥 잘라내기) -->
          <clipPath id="plateClip">
            <circle cx="256" cy="270" r="185"/>
          </clipPath>

        </defs>

        <!-- ── 배경 ── -->
        <rect width="512" height="512" fill="url(#bg)"/>

        <!-- ── 배경 ambient glow ── -->
        <ellipse cx="256" cy="310" rx="160" ry="120"
          fill="rgba(79,70,229,0.18)" filter="url(#ambient)"/>
        <ellipse cx="256" cy="200" rx="90" ry="110"
          fill="rgba(6,182,212,0.10)" filter="url(#ambient)"/>

        <!-- ── 외부 링 (이중) ── -->
        <!-- 링 트랙 -->
        <circle cx="256" cy="270" r="220" fill="none"
          stroke="rgba(255,255,255,0.04)" stroke-width="22"/>

        <!-- 링 상단 ~70% (시안→인디고) -->
        <circle cx="256" cy="270" r="220" fill="none"
          stroke="url(#ringTop)" stroke-width="14"
          stroke-linecap="round"
          stroke-dasharray="770 621"
          stroke-dashoffset="466"
          transform="rotate(0 256 270)"
          filter="url(#glow2)"/>

        <!-- 링 하단 ~25% (인디고→퍼플, 희미하게) -->
        <circle cx="256" cy="270" r="220" fill="none"
          stroke="url(#ringBot)" stroke-width="10"
          stroke-linecap="round"
          stroke-dasharray="310 1080"
          stroke-dashoffset="-386"
          transform="rotate(0 256 270)"
          filter="url(#glow2)"
          opacity="0.5"/>

        <!-- ── 내부 원판 ── -->
        <circle cx="256" cy="270" r="192" fill="url(#plate)"/>
        <circle cx="256" cy="270" r="192" fill="none"
          stroke="rgba(79,70,229,0.25)" stroke-width="1.5"/>

        <!-- ── 눈금 (4개, 미니멀) ── -->
        <g stroke="rgba(99,102,241,0.4)" stroke-width="4" stroke-linecap="round">
          <line x1="256" y1="82"  x2="256" y2="100"/>
          <line x1="256" y1="440" x2="256" y2="458"/>
          <line x1="68"  y1="270" x2="86"  y2="270"/>
          <line x1="426" y1="270" x2="444" y2="270"/>
        </g>

        <!-- ── 불꽃 ── -->

        <!-- 불꽃 배경 glow (원판 위에 살짝) -->
        <ellipse cx="256" cy="340" rx="90" ry="50"
          fill="rgba(6,182,212,0.18)" filter="url(#ambient)"
          clip-path="url(#plateClip)"/>

        <!-- 레이어 1: 가장 넓은 외곽 (차분한 퍼플~시안) -->
        <path d="
          M256 118
          C248 134 236 152 228 174
          C216 204 216 232 220 256
          C224 278 232 296 236 316
          C240 334 240 350 238 364
          C244 352 248 338 250 322
          C250 306 248 290 248 274
          C252 290 254 312 254 334
          C254 350 252 364 248 376
          C252 368 256 356 256 344
          C256 356 260 368 264 376
          C260 364 258 350 258 334
          C258 312 260 290 264 274
          C264 290 262 306 262 322
          C264 338 268 352 274 364
          C272 350 272 334 276 316
          C280 296 288 278 292 256
          C296 232 296 204 284 174
          C276 152 264 134 256 118Z"
          fill="url(#flame1)"
          filter="url(#glow)"
          opacity="0.75"/>

        <!-- 레이어 2: 중간 폭 (시안 메인) -->
        <path d="
          M256 136
          C250 154 242 174 238 198
          C232 224 234 248 238 268
          C242 286 248 302 250 318
          C252 332 252 344 250 356
          C253 346 256 334 256 322
          C256 334 259 346 262 356
          C260 344 260 332 262 318
          C264 302 270 286 274 268
          C278 248 280 224 274 198
          C270 174 262 154 256 136Z"
          fill="url(#flame2)"
          filter="url(#glow2)"
          opacity="0.9"/>

        <!-- 레이어 3: 코어 (가장 좁고 밝음) -->
        <path d="
          M256 158
          C253 174 250 194 250 214
          C250 232 253 248 256 260
          C259 248 262 232 262 214
          C262 194 259 174 256 158Z"
          fill="url(#flame3)"
          filter="url(#coreGlow)"
          opacity="0.95"/>

        <!-- 코어 팁 (흰 점) -->
        <ellipse cx="256" cy="166" rx="7" ry="10"
          fill="white"
          filter="url(#coreGlow)"
          opacity="0.9"/>

        <!-- 불꽃 하단 퍼짐 (원판 바닥과 자연스럽게 섞임) -->
        <ellipse cx="256" cy="358" rx="48" ry="18"
          fill="url(#baseGlow)"/>

        <!-- ── 내부 원판 광택 ── -->
        <circle cx="256" cy="270" r="192" fill="url(#shine)"/>

        <!-- ── 링 양 끝 점 ── -->
        <!-- 상단 시작점 -->
        <circle cx="256" cy="50" r="8"
          fill="#06B6D4" filter="url(#glow2)" opacity="0.9"/>
        <!-- 상단 끝점 (약간 희미) -->
        <circle cx="90"  cy="174" r="6"
          fill="#4F46E5" filter="url(#glow2)" opacity="0.5"/>

      </svg>
    </div>
    <div class="label">200px</div>
  </div>

  <!-- 128px -->
  <div class="col">
    <div class="icon-wrap" style="width:128px;height:128px;">
      <svg width="128" height="128" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="bg2" cx="50%" cy="42%">
            <stop offset="0%" stop-color="#12102a"/>
            <stop offset="100%" stop-color="#070610"/>
          </radialGradient>
          <radialGradient id="plate2" cx="42%" cy="36%">
            <stop offset="0%" stop-color="#19163a"/>
            <stop offset="100%" stop-color="#0c0a1e"/>
          </radialGradient>
          <linearGradient id="f1b" x1="50%" y1="100%" x2="50%" y2="0%">
            <stop offset="0%"   stop-color="#3730A3" stop-opacity="0"/>
            <stop offset="20%"  stop-color="#4338CA" stop-opacity="0.7"/>
            <stop offset="55%"  stop-color="#06B6D4"/>
            <stop offset="90%"  stop-color="#BAE6FD"/>
            <stop offset="100%" stop-color="white" stop-opacity="0.6"/>
          </linearGradient>
          <linearGradient id="f2b" x1="50%" y1="100%" x2="50%" y2="0%">
            <stop offset="0%"   stop-color="#4F46E5" stop-opacity="0.5"/>
            <stop offset="35%"  stop-color="#0891B2"/>
            <stop offset="75%"  stop-color="#22D3EE"/>
            <stop offset="100%" stop-color="#E0F2FE"/>
          </linearGradient>
          <linearGradient id="f3b" x1="50%" y1="100%" x2="50%" y2="0%">
            <stop offset="0%"  stop-color="#0EA5E9"/>
            <stop offset="55%" stop-color="#7DD3FC"/>
            <stop offset="100%" stop-color="white"/>
          </linearGradient>
          <filter id="g1b">
            <feGaussianBlur stdDeviation="11" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="g2b">
            <feGaussianBlur stdDeviation="5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="gcb">
            <feGaussianBlur stdDeviation="16" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="amb2"><feGaussianBlur stdDeviation="28"/></filter>
          <linearGradient id="rt2" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#0EA5E9"/>
            <stop offset="100%" stop-color="#4F46E5"/>
          </linearGradient>
        </defs>
        <rect width="512" height="512" fill="url(#bg2)"/>
        <ellipse cx="256" cy="310" rx="160" ry="120" fill="rgba(79,70,229,0.18)" filter="url(#amb2)"/>
        <ellipse cx="256" cy="200" rx="90"  ry="110" fill="rgba(6,182,212,0.10)" filter="url(#amb2)"/>
        <circle cx="256" cy="270" r="220" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="22"/>
        <circle cx="256" cy="270" r="220" fill="none" stroke="url(#rt2)" stroke-width="14"
          stroke-linecap="round" stroke-dasharray="770 621" stroke-dashoffset="466" filter="url(#g2b)"/>
        <circle cx="256" cy="270" r="220" fill="none" stroke="#7C3AED" stroke-width="10"
          stroke-linecap="round" stroke-dasharray="310 1080" stroke-dashoffset="-386" opacity="0.45" filter="url(#g2b)"/>
        <circle cx="256" cy="270" r="192" fill="url(#plate2)"/>
        <circle cx="256" cy="270" r="192" fill="none" stroke="rgba(79,70,229,0.25)" stroke-width="1.5"/>
        <g stroke="rgba(99,102,241,0.4)" stroke-width="4" stroke-linecap="round">
          <line x1="256" y1="82"  x2="256" y2="100"/>
          <line x1="256" y1="440" x2="256" y2="458"/>
          <line x1="68"  y1="270" x2="86"  y2="270"/>
          <line x1="426" y1="270" x2="444" y2="270"/>
        </g>
        <!-- 불꽃 레이어 1 -->
        <path d="M256 118 C248 134 236 152 228 174 C216 204 216 232 220 256 C224 278 232 296 236 316 C240 334 240 350 238 364 C244 352 248 338 250 322 C250 306 248 290 248 274 C252 290 254 312 254 334 C254 350 252 364 248 376 C252 368 256 356 256 344 C256 356 260 368 264 376 C260 364 258 350 258 334 C258 312 260 290 264 274 C264 290 262 306 262 322 C264 338 268 352 274 364 C272 350 272 334 276 316 C280 296 288 278 292 256 C296 232 296 204 284 174 C276 152 264 134 256 118Z"
          fill="url(#f1b)" filter="url(#g1b)" opacity="0.75"/>
        <!-- 불꽃 레이어 2 -->
        <path d="M256 136 C250 154 242 174 238 198 C232 224 234 248 238 268 C242 286 248 302 250 318 C252 332 252 344 250 356 C253 346 256 334 256 322 C256 334 259 346 262 356 C260 344 260 332 262 318 C264 302 270 286 274 268 C278 248 280 224 274 198 C270 174 262 154 256 136Z"
          fill="url(#f2b)" filter="url(#g2b)" opacity="0.9"/>
        <!-- 불꽃 코어 -->
        <path d="M256 158 C253 174 250 194 250 214 C250 232 253 248 256 260 C259 248 262 232 262 214 C262 194 259 174 256 158Z"
          fill="url(#f3b)" filter="url(#gcb)" opacity="0.95"/>
        <ellipse cx="256" cy="166" rx="7" ry="10" fill="white" filter="url(#gcb)" opacity="0.9"/>
        <ellipse cx="256" cy="358" rx="48" ry="18" fill="rgba(6,182,212,0.15)"/>
        <circle cx="256" cy="50" r="8" fill="#06B6D4" filter="url(#g2b)" opacity="0.9"/>
      </svg>
    </div>
    <div class="label">128px</div>
  </div>

  <!-- 64px -->
  <div class="col">
    <div class="icon-wrap" style="width:64px;height:64px;">
      <svg width="64" height="64" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="bg3" cx="50%" cy="42%">
            <stop offset="0%" stop-color="#12102a"/>
            <stop offset="100%" stop-color="#070610"/>
          </radialGradient>
          <linearGradient id="f1c" x1="50%" y1="100%" x2="50%" y2="0%">
            <stop offset="0%"  stop-color="#3730A3" stop-opacity="0"/>
            <stop offset="25%" stop-color="#4338CA" stop-opacity="0.8"/>
            <stop offset="60%" stop-color="#06B6D4"/>
            <stop offset="100%" stop-color="white" stop-opacity="0.7"/>
          </linearGradient>
          <linearGradient id="f2c" x1="50%" y1="100%" x2="50%" y2="0%">
            <stop offset="0%"  stop-color="#0891B2"/>
            <stop offset="65%" stop-color="#22D3EE"/>
            <stop offset="100%" stop-color="white"/>
          </linearGradient>
          <linearGradient id="rt3" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#0EA5E9"/>
            <stop offset="100%" stop-color="#4F46E5"/>
          </linearGradient>
        </defs>
        <rect width="512" height="512" fill="url(#bg3)"/>
        <circle cx="256" cy="270" r="220" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="22"/>
        <circle cx="256" cy="270" r="220" fill="none" stroke="url(#rt3)" stroke-width="16"
          stroke-linecap="round" stroke-dasharray="770 621" stroke-dashoffset="466"/>
        <circle cx="256" cy="270" r="220" fill="none" stroke="#7C3AED" stroke-width="11"
          stroke-dasharray="310 1080" stroke-dashoffset="-386" opacity="0.45"/>
        <circle cx="256" cy="270" r="192" fill="#12102a"/>
        <circle cx="256" cy="270" r="192" fill="none" stroke="rgba(79,70,229,0.25)" stroke-width="1.5"/>
        <path d="M256 118 C240 148 220 190 222 240 C224 276 236 308 250 352 C252 340 252 320 250 300 C254 320 256 342 256 356 C256 342 258 320 262 300 C260 320 260 340 262 352 C276 308 288 276 290 240 C292 190 272 148 256 118Z"
          fill="url(#f1c)" opacity="0.8"/>
        <path d="M256 138 C244 170 236 210 238 250 C240 278 248 304 256 340 C264 304 272 278 274 250 C276 210 268 170 256 138Z"
          fill="url(#f2c)" opacity="0.9"/>
        <ellipse cx="256" cy="170" rx="8" ry="14" fill="white" opacity="0.85"/>
      </svg>
    </div>
    <div class="label">64px</div>
  </div>

  <!-- 40px -->
  <div class="col">
    <div class="icon-wrap" style="width:40px;height:40px;">
      <svg width="40" height="40" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
        <rect width="512" height="512" fill="#0d0a1e"/>
        <circle cx="256" cy="270" r="220" fill="none" stroke="#06B6D4" stroke-width="18"
          stroke-dasharray="770 621" stroke-dashoffset="466"/>
        <circle cx="256" cy="270" r="220" fill="none" stroke="#7C3AED" stroke-width="12"
          stroke-dasharray="310 1080" stroke-dashoffset="-386" opacity="0.45"/>
        <circle cx="256" cy="270" r="192" fill="#110f28"/>
        <path d="M256 118 C236 160 216 210 224 262 C230 298 244 326 256 370 C268 326 282 298 288 262 C296 210 276 160 256 118Z"
          fill="#06B6D4" opacity="0.88"/>
        <path d="M256 140 C246 175 242 218 244 255 C247 280 252 305 256 340 C260 305 265 280 268 255 C270 218 266 175 256 140Z"
          fill="#BAE6FD" opacity="0.9"/>
        <ellipse cx="256" cy="155" rx="9" ry="14" fill="white" opacity="0.85"/>
      </svg>
    </div>
    <div class="label">40px</div>
  </div>

</div>

<div style="margin-top:56px; padding:20px 24px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); border-radius:14px; max-width:480px;">
  <p style="color:#666; font-size:13px; line-height:1.9;">
    시침/분침 제거 · 3레이어 불꽃 (퍼플→시안→흰팁) · 링은 시안+퍼플 이중<br>
    <span style="color:#444;">추가 조정이나 이걸로 확정이면 PNG 뽑아드릴게요</span>
  </p>
</div>

</body>
</html>
