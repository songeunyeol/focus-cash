<h1>Focus Cash — 아이콘 v2</h1>
<p class="sub">불꽃(D) + 타이머(C) 융합 · 화폐 기호 제거 · 금색 최소화</p>

<!-- ===== Ver C: 불꽃이 타이머 원 안에서 타오름 ===== -->
<div class="row">
  <div class="concept">
    <div class="tag">C</div>
    <div class="title">서클 플레임</div>
    <div class="sizes">

      <div class="icon-wrap" style="width:128px;height:128px;">
        <svg width="128" height="128" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="cbg" cx="50%" cy="50%">

            <filter id="cglow2">
