<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Focus Cash — 아이콘 내보내기 (C개선판)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #07070f;
      font-family: -apple-system, sans-serif;
      color: #fff;
      padding: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }
    h1 { font-size: 17px; font-weight: 700; color: #ddd; }
    .preview { border-radius: 22.5%; overflow: hidden;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 20px 60px rgba(0,0,0,0.8); }
    button {
      padding: 14px 40px;
      background: #06B6D4; color: #fff;
      border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700; cursor: pointer;
    }
    button:hover { background: #0891B2; }
    .note { font-size: 12px; color: #444; text-align: center; line-height: 1.8; }
  </style>
</head>
<body>

<h1>Focus Cash — C개선판 아이콘</h1>

<!-- 미리보기 (200px) -->
<div class="preview" style="width:200px;height:200px;">
  <svg id="iconSvg" width="200" height="200" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="bg" cx="50%" cy="42%">
        <stop offset="0%" stop-color="#12102a"/>
        <stop offset="60%" stop-color="#0c0a1e"/>
        <stop offset="100%" stop-color="#070610"/>
      </radialGradient>
      <radialGradient id="plate" cx="42%" cy="36%">
        <stop offset="0%" stop-color="#19163a"/>
        <stop offset="55%" stop-color="#110e28"/>
        <stop offset="100%" stop-color="#0c0a1e"/>
      </radialGradient>
      <linearGradient id="ringTop" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#0EA5E9"/>
        <stop offset="50%" stop-color="#06B6D4"/>
        <stop offset="100%" stop-color="#4F46E5"/>
      </linearGradient>
      <linearGradient id="ringBot" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#4F46E5"/>
        <stop offset="100%" stop-color="#7C3AED"/>
      </linearGradient>
      <linearGradient id="flame1" x1="50%" y1="100%" x2="50%" y2="0%">
        <stop offset="0%"   stop-color="#3730A3" stop-opacity="0"/>
        <stop offset="15%"  stop-color="#4338CA" stop-opacity="0.7"/>
        <stop offset="45%"  stop-color="#6366F1"/>
        <stop offset="70%"  stop-color="#06B6D4"/>
        <stop offset="90%"  stop-color="#BAE6FD"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0.6"/>
      </linearGradient>
      <linearGradient id="flame2" x1="50%" y1="100%" x2="50%" y2="0%">
        <stop offset="0%"   stop-color="#4F46E5" stop-opacity="0.5"/>
        <stop offset="30%"  stop-color="#0891B2"/>
        <stop offset="65%"  stop-color="#22D3EE"/>
        <stop offset="100%" stop-color="#E0F2FE"/>
      </linearGradient>
      <linearGradient id="flame3" x1="50%" y1="100%" x2="50%" y2="0%">
        <stop offset="0%"   stop-color="#0EA5E9"/>
        <stop offset="50%"  stop-color="#7DD3FC"/>
        <stop offset="100%" stop-color="#ffffff"/>
      </linearGradient>
      <radialGradient id="baseGlow" cx="50%" cy="100%">
        <stop offset="0%"   stop-color="#06B6D4" stop-opacity="0.35"/>
        <stop offset="60%"  stop-color="#4F46E5" stop-opacity="0.12"/>
        <stop offset="100%" stop-color="transparent"/>
      </radialGradient>
      <radialGradient id="shine" cx="32%" cy="24%">
        <stop offset="0%"  stop-color="rgba(255,255,255,0.09)"/>
        <stop offset="65%" stop-color="rgba(255,255,255,0)"/>
      </radialGradient>
      <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur stdDeviation="11" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow2" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="ambient" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="28"/>
      </filter>
      <filter id="coreGlow" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="16" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <clipPath id="plateClip">
        <circle cx="256" cy="270" r="185"/>
      </clipPath>
    </defs>

    <rect width="512" height="512" fill="url(#bg)"/>
    <ellipse cx="256" cy="310" rx="160" ry="120" fill="rgba(79,70,229,0.18)" filter="url(#ambient)"/>
    <ellipse cx="256" cy="200" rx="90"  ry="110" fill="rgba(6,182,212,0.10)"  filter="url(#ambient)"/>

    <circle cx="256" cy="270" r="220" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="22"/>
    <circle cx="256" cy="270" r="220" fill="none"
      stroke="url(#ringTop)" stroke-width="14" stroke-linecap="round"
      stroke-dasharray="770 621" stroke-dashoffset="466"
      filter="url(#glow2)"/>
    <circle cx="256" cy="270" r="220" fill="none"
      stroke="url(#ringBot)" stroke-width="10" stroke-linecap="round"
      stroke-dasharray="310 1080" stroke-dashoffset="-386"
      filter="url(#glow2)" opacity="0.5"/>

    <circle cx="256" cy="270" r="192" fill="url(#plate)"/>
    <circle cx="256" cy="270" r="192" fill="none" stroke="rgba(79,70,229,0.25)" stroke-width="1.5"/>

    <g stroke="rgba(99,102,241,0.4)" stroke-width="4" stroke-linecap="round">
      <line x1="256" y1="82"  x2="256" y2="100"/>
      <line x1="256" y1="440" x2="256" y2="458"/>
      <line x1="68"  y1="270" x2="86"  y2="270"/>
      <line x1="426" y1="270" x2="444" y2="270"/>
    </g>

    <ellipse cx="256" cy="340" rx="90" ry="50"
      fill="rgba(6,182,212,0.18)" filter="url(#ambient)" clip-path="url(#plateClip)"/>

    <path d="M256 118 C248 134 236 152 228 174 C216 204 216 232 220 256 C224 278 232 296 236 316 C240 334 240 350 238 364 C244 352 248 338 250 322 C250 306 248 290 248 274 C252 290 254 312 254 334 C254 350 252 364 248 376 C252 368 256 356 256 344 C256 356 260 368 264 376 C260 364 258 350 258 334 C258 312 260 290 264 274 C264 290 262 306 262 322 C264 338 268 352 274 364 C272 350 272 334 276 316 C280 296 288 278 292 256 C296 232 296 204 284 174 C276 152 264 134 256 118Z"
      fill="url(#flame1)" filter="url(#glow)" opacity="0.75"/>

    <path d="M256 136 C250 154 242 174 238 198 C232 224 234 248 238 268 C242 286 248 302 250 318 C252 332 252 344 250 356 C253 346 256 334 256 322 C256 334 259 346 262 356 C260 344 260 332 262 318 C264 302 270 286 274 268 C278 248 280 224 274 198 C270 174 262 154 256 136Z"
      fill="url(#flame2)" filter="url(#glow2)" opacity="0.9"/>

    <path d="M256 158 C253 174 250 194 250 214 C250 232 253 248 256 260 C259 248 262 232 262 214 C262 194 259 174 256 158Z"
      fill="url(#flame3)" filter="url(#coreGlow)" opacity="0.95"/>

    <ellipse cx="256" cy="166" rx="7" ry="10" fill="white" filter="url(#coreGlow)" opacity="0.9"/>

    <ellipse cx="256" cy="358" rx="48" ry="18" fill="url(#baseGlow)"/>

    <circle cx="256" cy="270" r="192" fill="url(#shine)"/>

    <circle cx="256" cy="50" r="8"  fill="#06B6D4" filter="url(#glow2)" opacity="0.9"/>
    <circle cx="90"  cy="174" r="6" fill="#4F46E5" filter="url(#glow2)" opacity="0.5"/>
  </svg>
</div>

<canvas id="canvas" width="1024" height="1024" style="display:none;"></canvas>

<button onclick="exportPng()">PNG 다운로드 (1024 × 1024)</button>

<p class="note">
  다운로드 후 아래 경로에 저장하세요<br>
  <code style="color:#06B6D4;">focus_cash/assets/icon/icon.png</code>
</p>

<script>
function exportPng() {
  const svg = document.getElementById('iconSvg');

  // SVG를 1024×1024 크기로 직렬화
  const clone = svg.cloneNode(true);
  clone.setAttribute('width', '1024');
  clone.setAttribute('height', '1024');
  clone.setAttribute('viewBox', '0 0 512 512');

  const svgData = new XMLSerializer().serializeToString(clone);
  const blob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
  const url  = URL.createObjectURL(blob);

  const img = new Image();
  img.onload = function() {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, 1024, 1024);
    ctx.drawImage(img, 0, 0, 1024, 1024);
    URL.revokeObjectURL(url);

    const a = document.createElement('a');
    a.download = 'icon.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  };
  img.src = url;
}
</script>

</body>
</html>
